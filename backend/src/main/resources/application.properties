spring.application.name=communityBuilder
spring.profiles.active=dev
server.port=8080
server.forward-headers-strategy=framework
spring.jpa.hibernate.ddl-auto=update

app.jwt.secret=${SECRET:Y2hhbmdlLW1lLXNlY3JldC1rZXktY2hhbmdlLW1lLXNlY3JldC1rZXk=}
app.jwt.expiration-ms=3600000
app.cookie.max-age=2592000
app.jwt.issuer=communityBuilder
app.custom.jwt-refresh.expiration-ms=604800000

app.cors.allowed-origins=http://localhost:3000,http://localhost:4200
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL}
spring.mail.password=${EMPASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.frontend.rest-password=http://localhost:3000/reset-password
spring.cache.type=caffeine

cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${CLOUD_API}
cloudinary.api-secret=${CLOUD_SECRET}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true


