<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0; padding:0; background-color:#f4f6f9; font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f9; padding:40px 0;">
    <tr>
        <td align="center">

            <!-- Main Container -->
            <table width="600" cellpadding="0" cellspacing="0"
                   style="background:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.05);">

                <!-- Header -->
                <tr>
                    <td align="center" style="background:#0d6efd; padding:30px;">
                        <h1 style="color:#ffffff; margin:0; font-size:24px;">
                            Ping
                        </h1>
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding:40px 30px; color:#333333;">
                        <p style="font-size:15px; line-height:1.6; color:#555;">
                            [[${customMessage}]]
                        </p>

                        <!-- Button -->
                        <table width="100%" style="margin:30px 0;">
                            <tr>
                                <td align="center">
                                    <a th:href="${actionLink}"
                                       style="background:#0d6efd;
                                              color:#ffffff;
                                              padding:12px 25px;
                                              text-decoration:none;
                                              border-radius:5px;
                                              font-size:14px;
                                              display:inline-block;">
                                        Reset Password
                                    </a>
                                </td>
                            </tr>
                        </table>

                        <p style="font-size:13px; color:#888;">
                            If the button doesn’t work, copy and paste this link into your browser:
                        </p>

                        <p style="font-size:12px; color:#0d6efd; word-break:break-all;">
                            [[${actionLink}]]
                        </p>

                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td align="center" style="background:#f8f9fa; padding:20px; font-size:12px; color:#999;">
                        © 2026 Smart Ecom. All rights reserved.
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
