name: CommunityBoard CI/CD

on:
  pull_request:
    branches: [main, Develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

env:
  AWS_REGION: eu-west-1
  PROJECT_NAME: communityboard
  JAVA_VERSION: '21'
  NODE_VERSION: '18'

jobs:
  # Stage 1: Code Quality (Parallel)
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      
      - name: Run Checkstyle
        working-directory: ./backend
        run: mvn checkstyle:check -B -q

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --prefer-offline --no-audit --silent
      
      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint --if-present

  # Stage 2: Unit Tests (Parallel, depends on Stage 1)
  test-backend:
    name: Unit Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-backend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      
      - name: Run unit tests
        working-directory: ./backend
        run: mvn test -B -q
      
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

  test-frontend:
    name: Unit Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --prefer-offline --no-audit --silent
      
      - name: Run unit tests
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false --silent
      
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # Stage 2b: Integration Tests (Parallel, depends on Stage 1)
  integration-test-backend:
    name: Integration Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-backend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      
      - name: Run integration tests
        working-directory: ./backend
        run: mvn test -B -q -Dtest=*IntegrationTest
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.RDS_ENDPOINT }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.RDS_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.RDS_PASSWORD }}

  integration-test-frontend:
    name: Integration Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --prefer-offline --no-audit --silent
      
      - name: Run integration tests
        working-directory: ./frontend
        run: npm test -- --testPathPattern=integration --watchAll=false --silent

  # Stage 3: Vulnerability Scan (Parallel, depends on Stage 2)
  scan-vulnerabilities:
    name: Scan Vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-backend, test-frontend, integration-test-backend, integration-test-frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # Stage 4: Build (Parallel, depends on Stage 3)
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [scan-vulnerabilities]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      
      - name: Build backend
        working-directory: ./backend
        run: mvn clean package -DskipTests -B -q
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [scan-vulnerabilities]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install and build
        working-directory: ./frontend
        run: |
          npm ci --prefer-offline --no-audit --silent
          npm run build --silent
        env:
          CI: true
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  # Stage 5: Scan Docker Images (Parallel, depends on Stage 4)
  scan-images:
    name: Scan Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build backend image
        run: docker build -t communityboard-backend:scan ./backend
      
      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'communityboard-backend:scan'
          format: 'sarif'
          output: 'backend-image-scan.sarif'
        continue-on-error: true
      
      - name: Build frontend image
        run: docker build -t communityboard-frontend:scan ./frontend
      
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'communityboard-frontend:scan'
          format: 'sarif'
          output: 'frontend-image-scan.sarif'
        continue-on-error: true
      
      - name: Upload backend image scan
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'backend-image-scan.sarif'
        continue-on-error: true
      
      - name: Upload frontend image scan
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'frontend-image-scan.sarif'
        continue-on-error: true

  # Stage 6: Docker Build & Push (Parallel, depends on Stage 5)
  push-backend:
    name: Push Backend Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: scan-images
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Develop'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true
      
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-backend:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-frontend:
    name: Push Frontend Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: scan-images
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Develop'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true
      
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-frontend:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 7: Deploy (depends on Stage 6)
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [push-backend, push-frontend]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Develop'
    environment:
      name: ${{ github.event.inputs.environment || 'development' }}
      url: http://${{ steps.get-url.outputs.alb_dns }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true
      
      - name: Update ECS services
        run: |
          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --service ${{ env.PROJECT_NAME }}-backend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager > /dev/null
          
          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --service ${{ env.PROJECT_NAME }}-frontend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager > /dev/null
      
      - name: Wait for deployment
        id: wait-deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --services ${{ env.PROJECT_NAME }}-backend ${{ env.PROJECT_NAME }}-frontend \
            --region ${{ env.AWS_REGION }}
          echo "status=success" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Rollback on failure
        if: steps.wait-deployment.outcome == 'failure'
        run: |
          echo "Deployment failed, rolling back..."
          exit 1
      
      - name: Get ALB URL
        id: get-url
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names ${{ env.PROJECT_NAME }}-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
      
      - name: Health check
        id: health-check
        run: |
          for i in {1..20}; do
            if curl -sf http://${{ steps.get-url.outputs.alb_dns }}/api-docs > /dev/null; then
              echo "Backend healthy"
              echo "status=healthy" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed"
          exit 1
        continue-on-error: true
      
      - name: Performance test
        if: steps.health-check.outputs.status == 'healthy'
        run: |
          for i in {1..3}; do
            curl -w "Request $i: %{time_total}s\n" -o /dev/null -s http://${{ steps.get-url.outputs.alb_dns }}/api-docs
          done
        continue-on-error: true
      
      - name: Deployment summary
        if: always()
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.health-check.outputs.status || 'deployed' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'development' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: http://${{ steps.get-url.outputs.alb_dns }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: http://${{ steps.get-url.outputs.alb_dns }}/api" >> $GITHUB_STEP_SUMMARY
