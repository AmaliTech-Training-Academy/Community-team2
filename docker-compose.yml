x-airflow-environment: &airflow-environment
  AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR:-LocalExecutor}
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_METADATA_DB_USER:-airflow}:${AIRFLOW_METADATA_DB_PASSWORD:-airflow}@${AIRFLOW_METADATA_DB_HOST:-airflow-postgres}:${AIRFLOW_METADATA_DB_PORT:-5432}/${AIRFLOW_METADATA_DB_NAME:-airflow}
  AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES:-false}
  AIRFLOW__CORE__DAGS_FOLDER: ${AIRFLOW_DAGS_FOLDER:-/opt/airflow/data-engineering/dags}
  AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW_DEFAULT_TIMEZONE:-UTC}
  AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: ${AIRFLOW_DAGBAG_IMPORT_TIMEOUT:-120}
  AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT: ${AIRFLOW_DAG_FILE_PROCESSOR_TIMEOUT:-180}
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: ${AIRFLOW_WEBSERVER_EXPOSE_CONFIG:-false}
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: ${AIRFLOW_SCHEDULER_ENABLE_HEALTH_CHECK:-true}
  AIRFLOW__EMAIL__EMAIL_BACKEND: airflow.utils.email.send_email_smtp
  AIRFLOW__EMAIL__FROM_EMAIL: ${AIRFLOW_SMTP_MAIL_FROM:-airflow@example.com}
  AIRFLOW__SMTP__SMTP_HOST: ${AIRFLOW_SMTP_HOST:-smtp.gmail.com}
  AIRFLOW__SMTP__SMTP_PORT: ${AIRFLOW_SMTP_PORT:-587}
  AIRFLOW__SMTP__SMTP_STARTTLS: ${AIRFLOW_SMTP_STARTTLS:-True}
  AIRFLOW__SMTP__SMTP_SSL: ${AIRFLOW_SMTP_SSL:-False}
  AIRFLOW__SMTP__SMTP_MAIL_FROM: ${AIRFLOW_SMTP_MAIL_FROM:-airflow@example.com}
  AIRFLOW_CONN_SMTP_DEFAULT: ${AIRFLOW_CONN_SMTP_DEFAULT:-}

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-community-airflow:local}
  build:
    context: ./data-engineering
    dockerfile: Dockerfile
  env_file:
    - ./data-engineering/.env
  environment: *airflow-environment
  user: "${AIRFLOW_UID:-50000}:0"
  working_dir: /opt/airflow/data-engineering
  volumes:
    - ./data-engineering:/opt/airflow/data-engineering
    - airflow_logs:/opt/airflow/logs
  depends_on:
    airflow-postgres:
      condition: service_healthy
  networks:
    - communityboard-network

services:
  backend:
    build: ./backend
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/communityboard
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: communityboard-secret-key-amalitech-2024
    networks:
      - communityboard-network

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - communityboard-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: communityboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - communityboard-network

  airflow-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${AIRFLOW_METADATA_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_METADATA_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_METADATA_DB_NAME:-airflow}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_METADATA_DB_USER:-airflow} -d ${AIRFLOW_METADATA_DB_NAME:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - communityboard-network

  airflow-init:
    <<: *airflow-common
    depends_on:
      airflow-postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users list | grep -q "${AIRFLOW_ADMIN_USERNAME:-admin}" ||
        airflow users create           --role "${AIRFLOW_ADMIN_ROLE:-Admin}"           --username "${AIRFLOW_ADMIN_USERNAME:-admin}"           --password "${AIRFLOW_ADMIN_PASSWORD:-admin}"           --firstname "${AIRFLOW_ADMIN_FIRSTNAME:-Community}"           --lastname "${AIRFLOW_ADMIN_LASTNAME:-Team}"           --email "${AIRFLOW_ADMIN_EMAIL:-airflow@example.com}"

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    restart: unless-stopped

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8088}:8080"
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: triggerer
    restart: unless-stopped

volumes:
  pgdata:
  airflow_postgres_data:
  airflow_logs:

networks:
  communityboard-network:
    driver: bridge
