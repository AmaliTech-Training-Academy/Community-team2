# Allure Report Configuration
# This file configures Allure reporting behavior

# Results directory where test execution data is stored
allure.results.directory=target/allure-results

# Link patterns for issue tracker integration (optional)
# Uncomment and configure if using JIRA or similar
# allure.link.issue.pattern=https://jira.company.com/browse/{}
# allure.link.tms.pattern=https://tms.company.com/testcase/{}

# Report title and description
allure.report.name=CommunityBoard UI Automation Test Report
allure.report.description=Selenium-based UI functional tests for CommunityBoard application
