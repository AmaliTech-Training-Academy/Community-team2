x-airflow-environment: &airflow-environment
  AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR:-LocalExecutor}
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_METADATA_DB_USER}:${AIRFLOW_METADATA_DB_PASSWORD}@${AIRFLOW_METADATA_DB_HOST:-airflow-postgres}:${AIRFLOW_METADATA_DB_PORT:-5432}/${AIRFLOW_METADATA_DB_NAME:-airflow}
  AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES:-"false"}
  AIRFLOW__CORE__DAGS_FOLDER: ${AIRFLOW_DAGS_FOLDER:-/opt/airflow/data-engineering/dags}
  AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW_DEFAULT_TIMEZONE:-UTC}
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: ${AIRFLOW_WEBSERVER_EXPOSE_CONFIG:-"false"}
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: ${AIRFLOW_SCHEDULER_ENABLE_HEALTH_CHECK:-"true"}
  AIRFLOW__EMAIL__EMAIL_BACKEND: airflow.utils.email.send_email_smtp
  AIRFLOW__EMAIL__FROM_EMAIL: ${AIRFLOW_SMTP_MAIL_FROM}
  AIRFLOW__SMTP__SMTP_HOST: ${AIRFLOW_SMTP_HOST:-smtp.gmail.com}
  AIRFLOW__SMTP__SMTP_PORT: ${AIRFLOW_SMTP_PORT:-587}
  AIRFLOW__SMTP__SMTP_STARTTLS: ${AIRFLOW_SMTP_STARTTLS:-True}
  AIRFLOW__SMTP__SMTP_SSL: ${AIRFLOW_SMTP_SSL:-False}
  AIRFLOW__SMTP__SMTP_MAIL_FROM: ${AIRFLOW_SMTP_MAIL_FROM}
  AIRFLOW_CONN_SMTP_DEFAULT: ${AIRFLOW_CONN_SMTP_DEFAULT}
  PIPELINE_DATA_SOURCE: ${AIRFLOW_PIPELINE_DATA_SOURCE:-postgres}
  REPLICA_SYNC_ENABLED: ${AIRFLOW_REPLICA_SYNC_ENABLED:-true}
  STAGGING_DDL_ENABLED: ${AIRFLOW_STAGGING_DDL_ENABLED:-true}
  WAREHOUSE_ENABLED: ${AIRFLOW_WAREHOUSE_ENABLED:-true}
  WAREHOUSE_DDL_ENABLED: ${AIRFLOW_WAREHOUSE_DDL_ENABLED:-true}
  STAGGING_SOURCE_SCHEMA: ${AIRFLOW_STAGGING_SOURCE_SCHEMA:-replica_raw}
  WAREHOUSE_SCHEMA: ${AIRFLOW_WAREHOUSE_SCHEMA:-analytics}
  BACKEND_DB_HOST: ${BACKEND_DB_HOST}
  BACKEND_DB_PORT: ${BACKEND_DB_PORT:-5432}
  BACKEND_DB_NAME: ${BACKEND_DB_NAME}
  BACKEND_DB_USER: ${BACKEND_DB_USER}
  BACKEND_DB_PASSWORD: ${BACKEND_DB_PASSWORD}
  REPLICA_DB_HOST: ${REPLICA_DB_HOST}
  REPLICA_DB_PORT: ${REPLICA_DB_PORT:-5432}
  REPLICA_DB_NAME: ${REPLICA_DB_NAME}
  REPLICA_DB_USER: ${REPLICA_DB_USER}
  REPLICA_DB_PASSWORD: ${REPLICA_DB_PASSWORD}
  ANALYTICS_DB_HOST: ${ANALYTICS_DB_HOST}
  ANALYTICS_DB_PORT: ${ANALYTICS_DB_PORT:-5432}
  ANALYTICS_DB_NAME: ${ANALYTICS_DB_NAME}
  ANALYTICS_DB_USER: ${ANALYTICS_DB_USER}
  ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-community-airflow:local}
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment: *airflow-environment
  user: "${AIRFLOW_UID:-50000}:0"
  working_dir: /opt/airflow/data-engineering
  volumes:
    - ./:/opt/airflow/data-engineering
    - airflow_logs:/opt/airflow/logs
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:15-alpine
    container_name: community-airflow-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_METADATA_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_METADATA_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_METADATA_DB_NAME:-airflow}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_METADATA_DB_USER} -d ${AIRFLOW_METADATA_DB_NAME:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped



  airflow-init:
    <<: *airflow-common
    container_name: community-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users list | grep -q "${AIRFLOW_ADMIN_USERNAME:-admin}" ||
        airflow users create           --role "${AIRFLOW_ADMIN_ROLE:-Admin}"           --username "${AIRFLOW_ADMIN_USERNAME:-admin}"           --password "${AIRFLOW_ADMIN_PASSWORD}"           --firstname "${AIRFLOW_ADMIN_FIRSTNAME:-Community}"           --lastname "${AIRFLOW_ADMIN_LASTNAME:-Team}"           --email "${AIRFLOW_ADMIN_EMAIL:-airflow@example.com}"

  airflow-scheduler:
    <<: *airflow-common
    container_name: community-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    restart: unless-stopped

  airflow-webserver:
    <<: *airflow-common
    container_name: community-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8088}:8080"
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    container_name: community-airflow-triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: triggerer
    restart: unless-stopped

volumes:
  airflow_postgres_data:
  airflow_logs:
