[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (slower, requires database)
    slow: Slow tests (full ETL pipeline)
addopts =
    -p no:pytest_postgresql
    -p no:pytest_postgresql.plugin
    -v
    --tb=short
    --strict-markers
    --color=yes
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
