data_source: ${PIPELINE_DATA_SOURCE:csv}

backend_source:
  db_role: backend
  schema: ${BACKEND_SOURCE_SCHEMA:public}
  tables:
    users: users
    posts: posts
    comments: comments
    categories: categories

stagging_source:
  db_role: replica
  schema: ${STAGGING_SOURCE_SCHEMA:replica_raw}
  tables:
    users: users
    posts: posts
    comments: comments
  ddl:
    enabled: ${STAGGING_DDL_ENABLED:false}
    migration_table: replica_schema_migrations
    directory: sql/replica

replica_sync:
  enabled: ${REPLICA_SYNC_ENABLED:false}
  load_mode: incremental
  truncate_cascade: true
  chunk_size: ${REPLICA_SYNC_CHUNK_SIZE:5000}
  create_schema_if_missing: true
  incremental_keys:
    users:
      - id
    posts:
      - id
    comments:
      - id

warehouse:
  enabled: ${WAREHOUSE_ENABLED:false}
  db_role: analytics
  schema: ${WAREHOUSE_SCHEMA:analytics}
  load_mode: incremental
  truncate_cascade: true
  chunk_size: ${WAREHOUSE_CHUNK_SIZE:5000}
  create_schema_if_missing: true
  incremental_keys:
    dim_users:
      - source_user_id
    dim_posts:
      - source_post_id
    fact_comments:
      - source_comment_id
  ddl:
    enabled: ${WAREHOUSE_DDL_ENABLED:false}
    migration_table: warehouse_schema_migrations
    directory: sql/warehouse
  tables:
    dim_users: dim_users_table
    dim_posts: dim_posts_table
    fact_comments: fact_comments_table

airflow:
  dag:
    id: community_etl_pipeline
    description: Sync backend data to replica and load the analytics warehouse.
    start_date: '2026-01-01T00:00:00+00:00'
    schedule: '@hourly'
    catchup: false
    max_active_runs: 1
    dagrun_timeout_minutes: 60
    render_template_as_native_obj: true
    tags:
      - data-engineering
      - etl
      - community
  default_args:
    owner: data-engineering
    depends_on_past: false
    retries: 3
    retry_delay_minutes: 5
    retry_exponential_backoff: true
    max_retry_delay_minutes: 30
  tasks:
    replica_sync:
      task_id: sync_backend_to_replica
      execution_timeout_minutes: 20
    etl_load:
      task_id: load_analytics_warehouse
      execution_timeout_minutes: 40
  monitoring:
    enabled: ${AIRFLOW_MONITORING_ENABLED:true}
    log_task_events: true
    log_result_summary: true
  notifications:
    email:
      enabled: ${AIRFLOW_EMAIL_NOTIFICATIONS_ENABLED:false}
      to: ${AIRFLOW_EMAIL_TO:}
      on_failure: ${AIRFLOW_EMAIL_NOTIFY_ON_FAILURE:true}
      on_retry: ${AIRFLOW_EMAIL_NOTIFY_ON_RETRY:true}
      on_success: ${AIRFLOW_EMAIL_NOTIFY_ON_SUCCESS:false}
      subject_prefix: ${AIRFLOW_EMAIL_SUBJECT_PREFIX:[community-etl]}
    webhook:
      enabled: false
      url: ${AIRFLOW_ALERT_WEBHOOK_URL:}
      on_failure: true
      on_retry: false
      on_success: false

csv_paths:
  users: sample-data/users.csv
  posts: sample-data/posts.csv
  comments: sample-data/comments.csv

sample_data:
  users: 20
  posts: 60
  comments: 220
  active_users_ratio: 0.3

categories:
  - NEWS
  - EVENT
  - DISCUSSION
  - ALERT

required_columns:
  posts:
    - id
    - user_id
    - title
    - content
    - category
    - created_at
  comments:
    - id
    - post_id
    - user_id
    - content
    - created_at
  users:
    - id
    - full_name
    - role
    - email
    - created_at

deduplicate_on:
  posts: id
  comments: id
  users: id

timestamp_columns:
  posts: created_at
  comments: created_at
  users: created_at

foreign_keys:
  comments:
    post_id: posts
    user_id: users

logging:
  level: INFO

database:
  role_keys:
    backend: backend_postgres_db
    replica: backend_replica_postgres_db
    analytics: analytics_postgres_db
  required_fields:
    - host
    - port
    - database
    - user
    - password
  connect_timeout_seconds: 10
  statement_timeout_ms: 300000
  retry:
    max_attempts: 3
    initial_delay_seconds: 1
    backoff_multiplier: 2

backend_postgres_db:
  host: ${BACKEND_DB_HOST:localhost}
  port: ${BACKEND_DB_PORT:5432}
  database: ${BACKEND_DB_NAME:communityboard}
  user: ${BACKEND_DB_USER:postgres}
  password: ${BACKEND_DB_PASSWORD:postgres}

backend_replica_postgres_db:
  host: ${REPLICA_DB_HOST:localhost}
  port: ${REPLICA_DB_PORT:5432}
  database: ${REPLICA_DB_NAME:communityboard}
  user: ${REPLICA_DB_USER:postgres}
  password: ${REPLICA_DB_PASSWORD:postgres}

analytics_postgres_db:
  host: ${ANALYTICS_DB_HOST:localhost}
  port: ${ANALYTICS_DB_PORT:5432}
  database: ${ANALYTICS_DB_NAME:communityboard}
  user: ${ANALYTICS_DB_USER:postgres}
  password: ${ANALYTICS_DB_PASSWORD:postgres}
