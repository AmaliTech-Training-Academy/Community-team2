environment: prod

data_source: postgres

database:
  role_keys:
    backend: backend_postgres_db
    replica: backend_replica_postgres_db
    analytics: analytics_postgres_db
  required_fields:
  - host
  - port
  - database
  - user
  - password

backend_source:
  db_role: backend
  schema: public
  tables:
    users: users
    posts: posts
    comments: comments

stagging_source:
  db_role: replica
  schema: replica_raw
  tables:
    users: users
    posts: posts
    comments: comments
  ddl:
    enabled: true
    migration_table: replica_schema_migrations
    directory: sql/replica

replica_sync:
  enabled: true
  load_mode: incremental
  truncate_cascade: true
  chunk_size: 5000
  create_schema_if_missing: true
  incremental_keys:
    users:
    - id
    posts:
    - id
    comments:
    - id

warehouse:
  enabled: true
  db_role: analytics
  schema: analytics
  load_mode: incremental
  truncate_cascade: true
  chunk_size: 5000
  create_schema_if_missing: true
  incremental_keys:
    dim_users:
    - source_user_id
    dim_posts:
    - source_post_id
    fact_posts:
    - source_post_id
    fact_comments:
    - source_comment_id
  ddl:
    enabled: true
    migration_table: schema_migrations
    directory: sql/warehouse
  tables:
    dim_users: dim_users_table
    dim_posts: dim_posts_table
    fact_posts: fact_posts_table
    fact_comments: fact_comments_table

backend_postgres_db:
  host: ${DB_HOST}
  port: ${DB_PORT}
  database: ${DB_NAME}
  user: ${DB_USER}
  password: ${DB_PASSWORD}

backend_replica_postgres_db:
  host: ${DB_HOST}
  port: ${DB_PORT}
  database: ${DB_NAME}
  user: ${DB_USER}
  password: ${DB_PASSWORD}

analytics_postgres_db:
  host: ${DB_HOST}
  port: ${DB_PORT}
  database: ${DB_NAME}
  user: ${DB_USER}
  password: ${DB_PASSWORD}

sample_data:
  users: 20
  posts: 60
  comments: 220
  active_users_ratio: 0.3

categories:
- NEWS
- EVENT
- DISCUSSION
- ALERT

required_columns:
  posts:
  - id
  - user_id
  - title
  - content
  - category
  - created_at

  comments:
  - id
  - post_id
  - user_id
  - content
  - created_at

  users:
  - id
  - username
  - email
  - role
  - created_at

deduplicate_on:
  posts: id
  comments: id
  users: id

timestamp_columns:
  posts: created_at
  comments: created_at
  users: created_at

foreign_keys:
  comments:
    post_id: posts
    user_id: users

pipeline:
  schedule: "@hourly"

logging:
  level: INFO
