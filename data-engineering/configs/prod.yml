environment: prod

data_source: postgres

postgres:
  host: postgres
  port: 5432
  database: communityboard
  user: airflow
  password: airflow

categories:
- NEWS
- EVENT
- DISCUSSION
- ALERT

required_columns:
  posts:
  - id
  - user_id
  - title
  - content
  - category
  - created_at

  comments:
  - id
  - post_id
  - user_id
  - content
  - created_at

  users:
  - id
  - username
  - email
  - created_at

deduplicate_on:
  posts: id
  comments: id
  users: id

timestamp_columns:
  posts: created_at
  comments: created_at
  users: created_at

foreign_keys:
  comments:
    post_id: posts
    user_id: users

pipeline:
  schedule: "@hourly"

logging:
  level: INFO
