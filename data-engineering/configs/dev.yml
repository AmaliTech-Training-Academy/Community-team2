environment: dev

data_source: csv

database:
  role_keys:
    backend: dev_db
    replica: dev_db
    analytics: dev_db
  required_fields:
  - host
  - port
  - database
  - user
  - password

postgres_source:
  db_role: replica
  tables:
    users: users
    posts: posts
    comments: comments

csv_paths:
  users: sample-data/users.csv
  posts: sample-data/posts.csv
  comments: sample-data/comments.csv

dev_db:
  host: ${DB_HOST:localhost}
  port: ${DB_PORT:5432}
  database: ${DB_NAME:communityboard}
  user: ${DB_USER:postgres}
  password: ${DB_PASSWORD:postgres}

sample_data:
  users: 20
  posts: 60
  comments: 220
  active_users_ratio: 0.3

categories:
- NEWS
- EVENT
- DISCUSSION
- ALERT

required_columns:
  posts:
  - id
  - user_id
  - title
  - content
  - category
  - created_at

  comments:
  - id
  - post_id
  - user_id
  - content
  - created_at

  users:
  - id
  - username
  - email
  - created_at

deduplicate_on:
  posts: id
  comments: id
  users: id

timestamp_columns:
  posts: created_at
  comments: created_at
  users: created_at

foreign_keys:
  comments:
    post_id: posts
    user_id: users

pipeline:
  schedule: '@hourly'

logging:
  level: INFO
